<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical References - Dr. Fetiya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-emerald-50 pb-10">

    <div class="bg-emerald-600 text-white p-5 flex items-center gap-4 shadow-md">
        <a href="index.html" class="text-xl"><i class="fas fa-arrow-left"></i></a>
        <h1 class="text-xl font-bold italic">Medical References</h1>
    </div>

    <div class="p-4 space-y-4">
        <div class="bg-white rounded-3xl p-5 shadow-sm border border-emerald-100">
            <h3 class="font-black text-emerald-700 mb-3 flex items-center gap-2">
                <i class="fas fa-vial"></i> Normal Lab Values
            </h3>
            <div class="space-y-2 text-sm text-gray-600">
                <div class="flex justify-between border-b pb-1">
                    <span>Hemoglobin (Hgb)</span>
                    <span class="font-bold text-gray-800">12-16 g/dL</span>
                </div>
                <div class="flex justify-between border-b pb-1">
                    <span>White Blood Cells</span>
                    <span class="font-bold text-gray-800">4,500-11,000</span>
                </div>
                <div class="flex justify-between border-b pb-1">
                    <span>Platelets</span>
                    <span class="font-bold text-gray-800">150k-450k</span>
                </div>
                <div class="flex justify-between border-b pb-1 text-rose-500">
                    <span>Blood Sugar (Fast)</span>
                    <span class="font-bold">70-100 mg/dL</span>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-3xl p-5 shadow-sm border border-emerald-100">
            <h3 class="font-black text-emerald-700 mb-3 flex items-center gap-2">
                <i class="fas fa-heartbeat"></i> Normal Vitals (Adult)
            </h3>
            <div class="space-y-2 text-sm text-gray-600">
                <div class="flex justify-between border-b pb-1">
                    <span>Blood Pressure</span>
                    <span class="font-bold text-gray-800">120/80 mmHg</span>
                </div>
                <div class="flex justify-between border-b pb-1">
                    <span>Heart Rate</span>
                    <span class="font-bold text-gray-800">60-100 bpm</span>
                </div>
                <div class="flex justify-between border-b pb-1">
                    <span>Respiratory Rate</span>
                    <span class="font-bold text-gray-800">12-20 bpm</span>
                </div>
            </div>
        </div>
    </div>

    <div class="px-6 italic text-[10px] text-gray-400 text-center">
        * እነዚህ መረጃዎች ለማስታወሻነት ብቻ ናቸው።
    </div>
    <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md h-20 border-t border-gray-100 flex justify-around items-center px-4 z-50 shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
    
    <a href="index.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-blue-600 transition">
        <i class="fas fa-home text-xl"></i>
        <span class="text-[10px] font-bold">Home</span>
    </a>

    <a href="logbook.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-blue-600 transition">
        <i class="fas fa-file-medical text-xl"></i>
        <span class="text-[10px] font-bold">Logs</span>
    </a>

    <button onclick="showSurprise()" class="relative -mt-10 bg-gradient-to-tr from-rose-500 to-pink-400 w-14 h-14 rounded-full shadow-lg shadow-rose-200 border-4 border-white flex items-center justify-center text-white active:scale-90 transition">
        <i class="fas fa-heart animate-pulse"></i>
    </button>

    <a href="notes.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-blue-600 transition">
        <i class="fas fa-pen-nib text-xl"></i>
        <span class="text-[10px] font-bold">Notes</span>
    </a>

    <a href="ref.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-blue-600 transition">
        <i class="fas fa-book text-xl"></i>
        <span class="text-[10px] font-bold">Ref</span>
    </a>
</div>

<script>
        function showSurprise() {
    const messages = [
        "وَقُل رَّبِّ زِدْنِي عِلْمًا\n\n«ጌታዬ ሆይ! እውቀትን ጨምርልኝ» በል (ሱረቱ ጣሀ፡ 114) ❤️",
        "وَتَوَكَّلْ عَلَى اللَّهِ ۚ وَكَفَىٰ بِاللَّهِ وَكِيلاً\n\nበአላህ ላይም ተመካ፤ መመኪያም በአላህ በቃ። (ሱረቱ አል-አህዛብ፡ 3) ✨",
        "وَمَا تَوْفِيقِي إِلَّا بِاللَّهِ ۚ عَلَيْهِ تَوَكَّلْتُ وَإِلَيْهِ أُنِيبُ\n\nስኬቴም በአላህ እንጂ በሌላ አይደለም፤ በእርሱ ላይ ተመካሁ፤ ወደ እርሱም እመለሳለሁ። (ሱረቱ ሁድ፡ 88) 🤲",
        "ትዕግስት (ሳብር) ለስኬት ቁልፍ ነው። አላህ የታጋሾችን ስራ አያጠፋም። ❤️"
    ];
</script>

</body>
</html>
