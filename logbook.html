<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Logbook - Dr. Fetiya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 pb-20">

    <div class="bg-blue-600 text-white p-5 flex items-center gap-4 shadow-md">
        <a href="index.html" class="text-xl"><i class="fas fa-arrow-left"></i></a>
        <h1 class="text-xl font-bold">Clinical Logbook</h1>
    </div>

    <div class="p-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <h2 class="text-lg font-bold text-gray-700 mb-4 text-center">Log New Patient</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">Patient ID (Initial/ID)</label>
                    <input type="text" id="patientId" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500" placeholder="e.g. Patient A">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">Age</label>
                        <input type="number" id="age" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500" placeholder="Age">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">Gender</label>
                        <select id="gender" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none">
                            <option>Male</option>
                            <option>Female</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">Diagnosis</label>
                    <textarea id="diagnosis" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500" rows="3" placeholder="Enter diagnosis details..."></textarea>
                </div>

                <button onclick="savePatient()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-blue-700 transition">
                    Register Patient <i class="fas fa-plus-circle ml-2"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="px-6 mt-4">
        <h3 class="font-bold text-gray-600 mb-3">Recent Logs</h3>
        <div id="patientList" class="space-y-3">
            </div>
    </div>

    <script>
        // Save patient to Local Storage
        function savePatient() {
            const id = document.getElementById('patientId').value;
            const age = document.getElementById('age').value;
            const gender = document.getElementById('gender').value;
            const diagnosis = document.getElementById('diagnosis').value;

            if(!id || !diagnosis) {
                alert("Please fill in all required fields!");
                return;
            }

            const patient = { id, age, gender, diagnosis, date: new Date().toLocaleDateString() };
            
            let patients = JSON.parse(localStorage.getItem('patients')) || [];
            patients.unshift(patient); 
            
            localStorage.setItem('patients', JSON.stringify(patients));
            
            alert("Patient registered successfully!");
            location.reload(); 
        }

        // Display saved patients
        function displayPatients() {
            const list = document.getElementById('patientList');
            let patients = JSON.parse(localStorage.getItem('patients')) || [];
            
            if(patients.length === 0) {
                list.innerHTML = "<p class='text-gray-400 text-sm italic text-center'>No patients registered yet.</p>";
                return;
            }

            list.innerHTML = patients.map(p => `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                    <div class="flex justify-between items-start">
                        <span class="font-bold text-blue-600">${p.id}</span>
                        <span class="text-[10px] text-gray-400">${p.date}</span>
                    </div>
                    <p class="text-xs text-gray-500 mt-1">${p.age} years old | ${p.gender}</p>
                    <p class="text-sm font-medium text-gray-700 mt-2 border-t pt-2 italic">${p.diagnosis}</p>
                </div>
            `).join('');
        }

        function showSurprise() {
            alert("Dr. Fetiya, today's hard work is the foundation for your great success tomorrow! I love you ❤️");
        }

        displayPatients();
    </script>

    <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md h-20 border-t border-gray-100 flex justify-around items-center px-4 z-50 shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
        <a href="index.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-blue-600 transition">
            <i class="fas fa-home text-xl"></i>
            <span class="text-[10px] font-bold">Home</span>
        </a>

        <a href="logbook.html" class="flex flex-col items-center gap-1 text-blue-600 transition">
            <i class="fas fa-file-medical text-xl"></i>
            <span class="text-[10px] font-bold">Logs</span>
        </a>

        <button onclick="showSurprise()" class="relative -mt-10 bg-gradient-to-tr from-rose-500 to-pink-400 w-14 h-14 rounded-full shadow-lg shadow-rose-200 border-4 border-white flex items-center justify-center text-white active:scale-90 transition">
            <i class="fas fa-heart animate-pulse"></i>
        </button>

        <a href="notes.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-blue-600 transition">
            <i class="fas fa-pen-nib text-xl"></i>
            <span class="text-[10px] font-bold">Notes</span>
        </a>

        <a href="ref.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-blue-600 transition">
            <i class="fas fa-book text-xl"></i>
            <span class="text-[10px] font-bold">Ref</span>
        </a>
    </div>

</body>
</html>
